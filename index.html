<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: linear-gradient(135deg, #111, #222);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Segoe UI, sans-serif;
    color: white;
}

.container {
    text-align: center;
}

h1 {
    margin-bottom: 15px;

    font-size: 42px;

    text-shadow:
        0 0 15px rgba(0,255,120,.5);
}

.stats {
    display: flex;
    justify-content: center;
    gap: 25px;
    margin-bottom: 15px;
    font-size: 20px;


    font-weight:600;

}

canvas {
    background: #000;
    border: 3px solid #444;
    border-radius: 15px;
    box-shadow: 0 0 30px rgba(0, 255, 100, .3);
}

.controls {
    margin-top: 15px;
    color: #aaa;
}

.overlay {
    position: fixed;
    top: 50%;
    left: 50%;

    transform: translate(-50%, -50%);

    display: none;
    flex-direction: column;
    align-items: center;

    min-width: 320px;

    padding: 30px;

    border-radius: 20px;

    background: rgba(20,20,20,.95);

    border: 1px solid rgba(0,255,120,.3);

    box-shadow:
        0 0 30px rgba(0,255,120,.25);

    backdrop-filter: blur(10px);

    z-index: 1000;
}

.overlay h2{
    margin-bottom: 10px;
    font-size: 32px;
    color:#ff5555;
}

#finalScore{
    font-size:22px;
    margin-top:10px;
}

.settings {
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;

    margin-bottom:20px;

    padding:15px;

    border-radius:15px;

    background:rgba(255,255,255,.04);

    border:1px solid rgba(255,255,255,.06);
}

.settings label {
    display: flex;
    align-items: center;
    gap: 6px;
}

.settings select {
    padding: 8px 12px;

    border-radius: 10px;

    border: 1px solid #444;

    background: #1b1b1b;

    color: white;

    cursor: pointer;
}

.settings select:hover{
    border-color:#00ff88;
}

.settings input[type="checkbox"]{
    width:18px;
    height:18px;
    cursor:pointer;
}

.mobile-controls{
    display:none;
}

@media (max-width: 768px){

    canvas{
        width:95vw;
        height:95vw;
        max-width:600px;
        max-height:600px;
    }

    .mobile-controls{
        display:flex;
        flex-direction:column;
        align-items:center;
        gap:10px;
        margin-top:20px;
    }

    .mobile-controls div{
        display:flex;
        gap:10px;
    }

    .mobile-controls button{

        width:70px;
        height:70px;

        border:none;

        border-radius:15px;

        background:#222;

        color:white;

        font-size:28px;

        cursor:pointer;

        box-shadow:
            0 0 10px rgba(0,255,100,.3);

    }

}
    
</style>
    
<body>

    <div class="container">
        <h1>🐍 Snake</h1>

        <div class="settings">

            <label>
                Скорость:
                <select id="speed">
                    <option value="180">Очень медленно</option>
                    <option value="140">Медленно</option>
                    <option value="100" selected>Нормально</option>
                    <option value="70">Быстро</option>
                    <option value="40">Очень быстро</option>
                </select>
            </label>

            <label>
                Границы:
                <select id="walls">
                    <option value="on">Стены</option>
                    <option value="off">Телепорт</option>
                </select>
            </label>

            <label>
                Еда:
                <select id="foodCount">
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                </select>
            </label>

            <label>
                Временная еда:
                <input type="checkbox" id="timedFood">
            </label>

        </div>

        <div class="stats">
            <div>Счёт: <span id="score">0</span></div>
            <div>Рекорд: <span id="best">0</span></div>
        </div>

        <canvas id="game" width="600" height="600"></canvas>

        <div class="mobile-controls">

            <button id="up">▲</button>

            <div>
                <button id="left">◀</button>
                <button id="down">▼</button>
                <button id="right">▶</button>
            </div>

        </div>

        <div class="controls">
            ← ↑ ↓ → управление |
            P пауза |
            R рестарт
        </div>
    </div>

    <div id="overlay" class="overlay">
        <h2>Игра окончена</h2>
        <p id="finalScore"></p>
        <br>
        <p>Нажмите R для новой игры</p>
    </div>
    <script src="js/script.js"></script>
</body>

</html>
