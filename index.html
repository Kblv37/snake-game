<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Pro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(135deg,#111,#222);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Segoe UI,sans-serif;
    color:white;
}

.container{
    text-align:center;
}

h1{
    margin-bottom:15px;
}

.stats{
    display:flex;
    justify-content:center;
    gap:25px;
    margin-bottom:15px;
    font-size:20px;
}

canvas{
    background:#000;
    border:3px solid #444;
    border-radius:15px;
    box-shadow:0 0 30px rgba(0,255,100,.3);
}

.controls{
    margin-top:15px;
    color:#aaa;
}

.overlay{
    position:absolute;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:rgba(0,0,0,.85);
    color:white;
    font-size:24px;
}
</style>
</head>
<body>

<div class="container">
    <h1>🐍 Snake Pro</h1>

    <div class="stats">
        <div>Счёт: <span id="score">0</span></div>
        <div>Рекорд: <span id="best">0</span></div>
    </div>

    <canvas id="game" width="600" height="600"></canvas>

    <div class="controls">
        ← ↑ ↓ → управление |
        P пауза |
        R рестарт
    </div>
</div>

<div id="overlay" class="overlay">
    <h2>Игра окончена</h2>
    <p id="finalScore"></p>
    <br>
    <p>Нажмите R для новой игры</p>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const bestEl = document.getElementById("best");
const overlay = document.getElementById("overlay");
const finalScore = document.getElementById("finalScore");

const CELL = 25;
const COUNT = canvas.width / CELL;

let snake;
let food;
let dx;
let dy;
let score;
let paused;
let gameOverState;

bestEl.textContent =
localStorage.getItem("snake_best") || 0;

function randomFood(){

    let pos;

    do{
        pos = {
            x: Math.floor(Math.random()*COUNT),
            y: Math.floor(Math.random()*COUNT)
        };
    }
    while(
        snake.some(
            s => s.x === pos.x && s.y === pos.y
        )
    );

    return pos;
}

function start(){

    snake = [
        {x:12,y:12},
        {x:11,y:12},
        {x:10,y:12}
    ];

    dx = 1;
    dy = 0;

    score = 0;
    paused = false;
    gameOverState = false;

    food = randomFood();

    scoreEl.textContent = 0;
    overlay.style.display = "none";
}

function drawGrid(){

    ctx.strokeStyle = "#111";

    for(let i=0;i<=COUNT;i++){

        ctx.beginPath();
        ctx.moveTo(i*CELL,0);
        ctx.lineTo(i*CELL,canvas.height);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0,i*CELL);
        ctx.lineTo(canvas.width,i*CELL);
        ctx.stroke();
    }
}

function draw(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    drawGrid();

    ctx.fillStyle = "#ff3b30";
    ctx.beginPath();
    ctx.arc(
        food.x*CELL+CELL/2,
        food.y*CELL+CELL/2,
        CELL/2.5,
        0,
        Math.PI*2
    );
    ctx.fill();

    snake.forEach((part,index)=>{

        ctx.fillStyle =
            index===0
            ? "#00ff88"
            : "#00bb66";

        ctx.fillRect(
            part.x*CELL+1,
            part.y*CELL+1,
            CELL-2,
            CELL-2
        );
    });
}

function update(){

    if(paused || gameOverState) return;

    const head = {
        x: snake[0].x + dx,
        y: snake[0].y + dy
    };

    if(
        head.x < 0 ||
        head.y < 0 ||
        head.x >= COUNT ||
        head.y >= COUNT
    ){
        return gameOver();
    }

    const eating =
        head.x === food.x &&
        head.y === food.y;

    if(!eating){
        snake.pop();
    }

    if(
        snake.some(
            p => p.x===head.x &&
                 p.y===head.y
        )
    ){
        return gameOver();
    }

    snake.unshift(head);

    if(eating){

        score++;

        scoreEl.textContent = score;

        let best =
        Number(
            localStorage.getItem(
                "snake_best"
            )
        ) || 0;

        if(score > best){

            best = score;

            localStorage.setItem(
                "snake_best",
                best
            );

            bestEl.textContent = best;
        }

        food = randomFood();
    }

    draw();
}

function gameOver(){

    gameOverState = true;

    finalScore.textContent =
    "Ваш счёт: " + score;

    overlay.style.display = "flex";
}

document.addEventListener(
    "keydown",
    e=>{

        if(e.key==="ArrowUp" && dy!==1){
            dx=0;
            dy=-1;
        }

        if(e.key==="ArrowDown" && dy!==-1){
            dx=0;
            dy=1;
        }

        if(e.key==="ArrowLeft" && dx!==1){
            dx=-1;
            dy=0;
        }

        if(e.key==="ArrowRight" && dx!==-1){
            dx=1;
            dy=0;
        }

        if(
            e.key.toLowerCase()==="p"
        ){
            paused = !paused;
        }

        if(
            e.key.toLowerCase()==="r"
        ){
            start();
        }
    }
);

start();
draw();

setInterval(update,100);
</script>

</body>
</html>
