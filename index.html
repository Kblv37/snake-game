<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">
        <h1>🐍 Snake</h1>

        <div class="settings">

            <label>
                Скорость:
                <select id="speed">
                    <option value="180">Очень медленно</option>
                    <option value="140">Медленно</option>
                    <option value="100" selected>Нормально</option>
                    <option value="70">Быстро</option>
                    <option value="40">Очень быстро</option>
                </select>
            </label>

            <label>
                Границы:
                <select id="walls">
                    <option value="on">Стены</option>
                    <option value="off">Телепорт</option>
                </select>
            </label>

            <label>
                Еда:
                <select id="foodCount">
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                </select>
            </label>

            <label>
                Временная еда:
                <input type="checkbox" id="timedFood">
            </label>

        </div>

        <div class="stats">
            <div>Счёт: <span id="score">0</span></div>
            <div>Рекорд: <span id="best">0</span></div>
        </div>

        <canvas id="game" width="600" height="600"></canvas>

        <div class="mobile-controls">

            <button id="up">▲</button>

            <div>
                <button id="left">◀</button>
                <button id="down">▼</button>
                <button id="right">▶</button>
            </div>

        </div>

        <div class="controls">
            ← ↑ ↓ → управление |
            P пауза |
            R рестарт
        </div>
    </div>

    <div id="overlay" class="overlay">
        <h2>Игра окончена</h2>
        <p id="finalScore"></p>
        <br>
        <p>Нажмите R для новой игры</p>
    </div>
    <script src="js/script.js"></script>
</body>

</html>
